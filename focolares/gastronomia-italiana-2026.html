<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição — Festa da Gastronomia Italiana 2026 | Focolares</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5ede0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,.10);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: #1a5c38;
      padding: 2rem 1.75rem 1.75rem;
      color: #fff;
      text-align: center;
    }

    .header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: .3rem;
    }

    .header p {
      font-size: .9rem;
      opacity: .8;
    }

    .body {
      padding: 1.75rem;
    }

    .section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: .875rem;
    }

    .field {
      margin-bottom: 1.125rem;
    }

    .field label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .35rem;
    }

    .field input {
      width: 100%;
      padding: .625rem .875rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .975rem;
      color: #111827;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }

    .field input:focus {
      outline: none;
      border-color: #1a5c38;
      box-shadow: 0 0 0 3px rgba(26,92,56,.12);
    }

    .field input.invalid {
      border-color: #ef4444;
    }

    .field input.invalid:focus {
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }

    .field-error {
      margin-top: .3rem;
      font-size: .78rem;
      color: #ef4444;
      min-height: 1rem;
    }

    .required {
      color: #ef4444;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 1.375rem 0;
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .875rem;
    }

    .qty-label {
      flex: 1;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
    }

    .qty-label .price-tag {
      display: block;
      font-size: .78rem;
      color: #6b7280;
      font-weight: 400;
      margin-top: .1rem;
    }

    .qty-control {
      display: flex;
      align-items: center;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 36px;
      height: 36px;
      background: #f9fafb;
      border: none;
      cursor: pointer;
      font-size: 1.15rem;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
    }

    .qty-btn:hover { background: #f0f0f0; }
    .qty-btn:active { background: #e5e7eb; }

    .qty-input {
      width: 44px;
      height: 36px;
      border: none;
      border-left: 1.5px solid #d1d5db;
      border-right: 1.5px solid #d1d5db;
      border-radius: 0;
      padding: 0 .25rem;
      text-align: center;
      font-size: .975rem;
      font-weight: 600;
      color: #111827;
      background: #fff;
    }

    .qty-input:focus {
      outline: none;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; }

    .summary {
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 1rem 1.125rem;
      margin: 1.375rem 0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: .9rem;
      color: #6b7280;
      padding: .2rem 0;
    }

    .summary-row.total-row {
      border-top: 1px solid #e5e7eb;
      margin-top: .625rem;
      padding-top: .75rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #111827;
    }

    .summary-row.total-row .amount {
      color: #1a5c38;
    }

    .submit-btn {
      width: 100%;
      padding: .875rem;
      background: #1a5c38;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      transition: background .15s, transform .1s;
    }

    .submit-btn:hover:not(:disabled) { background: #155030; }
    .submit-btn:active:not(:disabled) { transform: scale(.98); }
    .submit-btn:disabled { background: #9ca3af; cursor: default; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .feedback {
      margin-top: 1rem;
      padding: .875rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      text-align: center;
      display: none;
      line-height: 1.45;
    }

    .feedback.success {
      display: block;
      background: #d1fae5;
      color: #065f46;
    }

    .feedback.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Festa da Gastronomia Italiana 2026</h1>
      <p>Focolares &mdash; Formulário de Inscrição</p>
    </div>

    <div class="body">
      <form id="inscricao" novalidate>

        <p class="section-label">Seus dados</p>

        <div class="field">
          <label for="nome">Nome completo <span class="required">*</span></label>
          <input type="text" id="nome" autocomplete="name" placeholder="Nome Sobrenome">
          <div class="field-error" id="nome-error"></div>
        </div>

        <div class="field">
          <label for="telefone">Telefone WhatsApp <span class="required">*</span></label>
          <input type="tel" id="telefone" autocomplete="tel" placeholder="(11) 99999-9999" inputmode="numeric">
          <div class="field-error" id="telefone-error"></div>
        </div>

        <hr class="divider">

        <p class="section-label">Convites</p>

        <div class="qty-row">
          <span class="qty-label">
            Adulto
            <span class="price-tag">R$&nbsp;165,00 / convite</span>
          </span>
          <div class="qty-control">
            <button type="button" class="qty-btn" data-target="adultos" data-op="-">&#8722;</button>
            <input class="qty-input" type="number" id="adultos" value="0" min="0" max="99">
            <button type="button" class="qty-btn" data-target="adultos" data-op="+">&#43;</button>
          </div>
        </div>

        <div class="qty-row">
          <span class="qty-label">
            Criança pagante
            <span class="price-tag">R$&nbsp;85,00 / convite</span>
          </span>
          <div class="qty-control">
            <button type="button" class="qty-btn" data-target="criancas_pagantes" data-op="-">&#8722;</button>
            <input class="qty-input" type="number" id="criancas_pagantes" value="0" min="0" max="99">
            <button type="button" class="qty-btn" data-target="criancas_pagantes" data-op="+">&#43;</button>
          </div>
        </div>

        <div class="qty-row">
          <span class="qty-label">
            Criança não pagante
            <span class="price-tag">gratuito</span>
          </span>
          <div class="qty-control">
            <button type="button" class="qty-btn" data-target="criancas_nao_pagantes" data-op="-">&#8722;</button>
            <input class="qty-input" type="number" id="criancas_nao_pagantes" value="0" min="0" max="99">
            <button type="button" class="qty-btn" data-target="criancas_nao_pagantes" data-op="+">&#43;</button>
          </div>
        </div>

        <div class="summary">
          <div class="summary-row">
            <span>Adultos</span>
            <span id="subtotal-adultos">R$&nbsp;0,00</span>
          </div>
          <div class="summary-row">
            <span>Crianças pagantes</span>
            <span id="subtotal-criancas">R$&nbsp;0,00</span>
          </div>
          <div class="summary-row total-row">
            <span>Total (<span id="qtd-total">0</span> convites)</span>
            <span class="amount" id="valor-total">R$&nbsp;0,00</span>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Confirmar inscrição
        </button>

        <div class="feedback" id="feedback"></div>

      </form>
    </div>
  </div>

  <script>
    // ── Configuração ─────────────────────────────────────────────────────────
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQtMEUDkdb0s6OGlBN-0LED8ImgMVWwK3l-7nvrYXI3_pWDKBgObIiX_j2NNveUJ1s/exec';
    var WA_NUMBER  = '5511987529809';
    var PRECO      = { adulto: 165, criancaPagante: 85 };

    // ── Helpers ──────────────────────────────────────────────────────────────
    function brl(n) {
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function getInt(id) {
      return Math.max(0, parseInt(document.getElementById(id).value, 10) || 0);
    }

    // ── Cálculo de totais ────────────────────────────────────────────────────
    function atualizarTotais() {
      var adultos   = getInt('adultos');
      var pagantes  = getInt('criancas_pagantes');
      var gratuitas = getInt('criancas_nao_pagantes');

      var subA  = adultos * PRECO.adulto;
      var subC  = pagantes * PRECO.criancaPagante;
      var total = subA + subC;
      var qtd   = adultos + pagantes + gratuitas;

      document.getElementById('subtotal-adultos').textContent  = brl(subA);
      document.getElementById('subtotal-criancas').textContent = brl(subC);
      document.getElementById('qtd-total').textContent         = qtd;
      document.getElementById('valor-total').textContent       = brl(total);
    }

    // ── Botões +/− ───────────────────────────────────────────────────────────
    document.querySelectorAll('.qty-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var input = document.getElementById(btn.dataset.target);
        var val   = parseInt(input.value, 10) || 0;
        input.value = btn.dataset.op === '+' ? val + 1 : Math.max(0, val - 1);
        atualizarTotais();
      });
    });

    document.querySelectorAll('.qty-input').forEach(function(input) {
      input.addEventListener('input', atualizarTotais);
    });

    // ── Máscara de telefone ──────────────────────────────────────────────────
    document.getElementById('telefone').addEventListener('input', function() {
      var d = this.value.replace(/\D/g, '').slice(0, 11);
      var r = '';
      if (d.length >= 1)  r = '(' + d.slice(0, 2);
      if (d.length >= 3)  r += ') ' + d.slice(2, d.length <= 10 ? 6 : 7);
      if (d.length >= 7 && d.length <= 10) r += '-' + d.slice(6);
      if (d.length > 10)  r += '-' + d.slice(7);
      this.value = r;
    });

    // ── Validação ────────────────────────────────────────────────────────────
    function validar() {
      var ok = true;

      var nomeInput = document.getElementById('nome');
      var nomeVal   = nomeInput.value.trim();
      if (!nomeVal || nomeVal.split(/\s+/).length < 2) {
        nomeInput.classList.add('invalid');
        document.getElementById('nome-error').textContent = 'Informe nome e sobrenome.';
        ok = false;
      } else {
        nomeInput.classList.remove('invalid');
        document.getElementById('nome-error').textContent = '';
      }

      var telInput  = document.getElementById('telefone');
      var telDigits = telInput.value.replace(/\D/g, '');
      if (telDigits.length < 10) {
        telInput.classList.add('invalid');
        document.getElementById('telefone-error').textContent = 'Informe um telefone com DDD (ex: 11 99999-9999).';
        ok = false;
      } else {
        telInput.classList.remove('invalid');
        document.getElementById('telefone-error').textContent = '';
      }

      var qtdTotal = getInt('adultos') + getInt('criancas_pagantes') + getInt('criancas_nao_pagantes');
      if (qtdTotal === 0) {
        mostrarFeedback('error', 'Selecione ao menos 1 convite para continuar.');
        ok = false;
      }

      return ok;
    }

    // ── Mensagem WhatsApp ────────────────────────────────────────────────────
    function montarMensagemWA(nome, telefone, adultos, pagantes, gratuitas, qtd, valor) {
      return [
        '*Inscrição — Festa da Gastronomia Italiana 2026*',
        '',
        'Nome: ' + nome,
        'Telefone: ' + telefone,
        '',
        'Convites:',
        '  Adulto: ' + adultos + ' × ' + brl(PRECO.adulto),
        '  Criança pagante: ' + pagantes + ' × ' + brl(PRECO.criancaPagante),
        '  Criança não pagante: ' + gratuitas,
        '',
        'Total: ' + qtd + ' convite' + (qtd !== 1 ? 's' : ''),
        'Valor total: ' + brl(valor),
      ].join('\n');
    }

    // ── Feedback ─────────────────────────────────────────────────────────────
    function mostrarFeedback(tipo, msg) {
      var el = document.getElementById('feedback');
      el.className = 'feedback ' + tipo;
      el.textContent = msg;
    }

    function limparFeedback() {
      var el = document.getElementById('feedback');
      el.className = 'feedback';
      el.textContent = '';
    }

    // ── Submit ───────────────────────────────────────────────────────────────
    document.getElementById('inscricao').addEventListener('submit', function(e) {
      e.preventDefault();
      limparFeedback();
      if (!validar()) return;

      var adultos   = getInt('adultos');
      var pagantes  = getInt('criancas_pagantes');
      var gratuitas = getInt('criancas_nao_pagantes');
      var qtd       = adultos + pagantes + gratuitas;
      var valor     = adultos * PRECO.adulto + pagantes * PRECO.criancaPagante;
      var nome      = document.getElementById('nome').value.trim();
      var telefone  = document.getElementById('telefone').value.trim();

      var btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Enviando…';

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode:   'no-cors',
        body:   JSON.stringify({
          nome:                  nome,
          telefone:              telefone,
          adultos:               adultos,
          criancas_pagantes:     pagantes,
          criancas_nao_pagantes: gratuitas,
          total_convites:        qtd,
          total_valor:           valor,
          timestamp:             new Date().toISOString()
        })
      })
      .then(function() {
        var params = new URLSearchParams({
          nome:      nome,
          telefone:  telefone,
          adultos:   adultos,
          pagantes:  pagantes,
          gratuitas: gratuitas,
          qtd:       qtd,
          valor:     valor
        });
        window.location.href = 'confirmacao.html?' + params.toString();
      })
      .catch(function() {
        mostrarFeedback('error', 'Falha ao enviar. Verifique sua conexão e tente novamente.');
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = 'Confirmar inscrição';
      });
    });
  </script>
</body>
</html>
